<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FCA·PRO — Facility Condition Assessment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0F14;--bg2:#0F1720;--bg3:#162030;--bg4:#1C2A3A;--bg5:#233347;
  --br:#1E2E40;--br2:#283D52;--br3:#324E67;
  --tx:#DDE6EE;--tx2:#8BA5BC;--tx3:#4D6E87;--tx4:#2E4A61;
  --ac:#2B7FFF;--ac2:#1A6AE8;--acg:rgba(43,127,255,0.12);--acb:rgba(43,127,255,0.25);
  --gr:#0FBA7A;--grg:rgba(15,186,122,0.12);--grb:rgba(15,186,122,0.2);
  --am:#F5A623;--amg:rgba(245,166,35,0.12);--amb:rgba(245,166,35,0.22);
  --rd:#E84545;--rdg:rgba(232,69,69,0.1);--rdb:rgba(232,69,69,0.22);
  --or:#FF7A2B;--org:rgba(255,122,43,0.1);--orb:rgba(255,122,43,0.2);
  --pu:#9B6DFF;--pug:rgba(155,109,255,0.1);--pub:rgba(155,109,255,0.2);
  --cy:#00D4FF;--cyg:rgba(0,212,255,0.08);
  --r:6px;--r2:10px;--r3:14px;--r4:20px;
  --font:"Segoe UI","Segoe UI Variable Text",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  --mono:"Cascadia Mono",Consolas,"SF Mono",Menlo,monospace;
  --display:"Segoe UI","Segoe UI Variable Display",system-ui,-apple-system,Arial,sans-serif;
  --sh:0 8px 32px rgba(0,0,0,0.5);--sh2:0 2px 8px rgba(0,0,0,0.3);
}
/* iPad / touch optimization */
*{-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overscroll-behavior:none}
button,select,.sb-item,.tier-tab,.sub-tab,.sort-chip,.disc-chip,.bsel-row,.pf-chip{min-height:38px;touch-action:manipulation}
input,select,textarea{font-size:16px!important;min-height:38px}
textarea{min-height:56px!important}
td,th{padding-top:9px!important;padding-bottom:9px!important}
.btn{min-height:38px;font-size:13px}
.btn-sm{min-height:34px;font-size:12px}
.btn-xs{min-height:30px;font-size:11px}
.btn-ic{min-width:32px;min-height:32px;display:inline-flex;align-items:center;justify-content:center}
.sb-item{font-size:13px}
.tier-tab{font-size:13px;padding:10px 18px}
.sub-tab{font-size:12px;padding:8px 14px}
table{font-size:12.5px}
.content,.mo-b,.dp-b{-webkit-overflow-scrolling:touch}
html,body,#root{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--font);font-size:13px;line-height:1.5;scrollbar-width:thin;scrollbar-color:var(--br2) transparent}
/* scrollbars */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
/* Shell */
.shell{display:flex;flex-direction:column;height:100%}
/* Topbar */
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:50}
.logo{font-family:var(--display);font-size:17px;font-weight:900;letter-spacing:-0.5px;color:var(--tx);display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;background:var(--ac);border-radius:50%;flex-shrink:0;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.85)}}
.logo-tag{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:0.1em;padding:2px 6px;background:var(--bg3);border:1px solid var(--br);border-radius:4px;text-transform:uppercase}
.topbar-bldg{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bg3);border:1px solid var(--br);border-radius:var(--r);cursor:pointer;transition:all 0.15s}
.topbar-bldg:hover{border-color:var(--br2);background:var(--bg4)}
.topbar-bldg-name{font-size:12px;font-weight:600;color:var(--tx)}
.topbar-bldg-sub{font-size:10px;color:var(--tx3);font-family:var(--mono)}
.tb-spacer{flex:1}
.tb-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all 0.15s;white-space:nowrap}
.tb-btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--br)}
.tb-btn-ghost:hover{background:var(--bg3);color:var(--tx);border-color:var(--br2)}
.tb-btn-primary{background:var(--ac);color:#fff}
.tb-btn-primary:hover{background:var(--ac2);box-shadow:none}
/* Body */
.body{display:flex;flex:1;overflow:hidden}
/* Sidebar */
.sidebar{width:196px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow-y:auto}
.sb-sec{padding:14px 10px 6px;font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--tx4);text-transform:uppercase;font-family:var(--mono)}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 10px;margin:1px 6px;border-radius:var(--r);cursor:pointer;color:var(--tx3);transition:all 0.12s;font-size:12px;position:relative}
.sb-item:hover{background:var(--bg3);color:var(--tx2)}
.sb-item.on{background:var(--acg);color:var(--ac);border:1px solid var(--acb)}
.sb-item .ic{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:10px;font-family:var(--mono);font-weight:600}
.sb-badge.rd{background:var(--rdg);color:var(--rd);border:1px solid var(--rdb)}
.sb-badge.am{background:var(--amg);color:var(--am);border:1px solid var(--amb)}
.sb-badge.gr{background:var(--grg);color:var(--gr);border:1px solid var(--grb)}
.sb-group{padding:6px 10px 3px;font-size:8px;font-weight:700;letter-spacing:0.14em;color:var(--tx4);text-transform:uppercase;font-family:var(--mono);display:flex;align-items:center;gap:5px;margin-top:4px}
.sb-group-line{flex:1;height:1px;background:var(--br)}
.sb-group-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-item-indent{padding-left:18px}
/* Suggestion modal */
.sugg-card{background:var(--bg3);border:1px solid var(--br);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.sugg-card:hover{border-color:var(--br2);background:var(--bg4)}
.sugg-card.sel{border-color:var(--ac);background:var(--acg)}
.sugg-disc{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r4);font-size:9px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em}
.sugg-disc.arch{background:rgba(43,127,255,0.12);color:var(--ac);border:1px solid var(--acb)}
.sugg-disc.mech{background:rgba(15,186,122,0.12);color:var(--gr);border:1px solid var(--grb)}
.sugg-disc.elec{background:rgba(155,109,255,0.12);color:var(--pu);border:1px solid var(--pub)}
.sugg-disc.struct{background:rgba(245,166,35,0.12);color:var(--am);border:1px solid var(--amb)}
.sugg-disc.haz{background:rgba(232,69,69,0.1);color:var(--rd);border:1px solid var(--rdb)}
.pulse-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s ease infinite;flex-shrink:0}
/* Buildings sidebar panel */
.bldg-list{display:flex;flex-direction:column;gap:6px;padding:8px}
.bldg-card-sb{border-radius:var(--r);border:1px solid var(--br);padding:10px 11px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.bldg-card-sb:hover{border-color:var(--br2);background:var(--bg3)}
.bldg-card-sb.active{border-color:var(--ac);background:var(--acg)}
.bldg-card-sb .bc-name{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.bldg-card-sb .bc-sub{font-size:10px;color:var(--tx3);font-family:var(--mono)}
.bldg-card-sb .bc-cost{font-size:11px;font-weight:700;color:var(--am);font-family:var(--mono);margin-top:3px}
/* Building overview page */
.bov-hero{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:20px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.bov-photo{width:100%;max-height:220px;object-fit:cover;border-radius:var(--r);margin-bottom:14px;border:1px solid var(--br)}
.bov-photo-placeholder{width:100%;height:160px;background:var(--bg4);border-radius:var(--r);border:2px dashed var(--br2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;margin-bottom:14px;gap:8px}
.bov-photo-placeholder:hover{border-color:var(--ac);background:var(--acg)}
.bov-cost-ring{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.bov-cost-item{flex:1;min-width:80px;background:var(--bg3);border:1px solid var(--br);border-radius:var(--r);padding:8px 10px;text-align:center;overflow:hidden}
.bov-cost-item .val{font-family:var(--display);font-size:clamp(12px,2.2vw,20px);font-weight:900;line-height:1;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bov-cost-item .lbl{font-size:9px;color:var(--tx3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.07em}
.bsel-strip{background:var(--bg2);border-bottom:1px solid var(--br);overflow:hidden}
.bsel-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 3px;cursor:pointer}
.bsel-hdr-label{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--tx4);font-family:var(--mono);text-transform:uppercase}
.bsel-hdr-count{font-size:9px;color:var(--tx4);font-family:var(--mono)}
.bsel-row{display:flex;align-items:center;gap:7px;padding:5px 8px;cursor:pointer;transition:background .12s;border-left:2px solid transparent}
.bsel-row:hover{background:var(--bg3)}
.bsel-row.active{background:var(--acg);border-left-color:var(--ac)}
.bsel-row .bsr-thumb{width:30px;height:30px;border-radius:4px;object-fit:cover;flex-shrink:0}
.bsel-row .bsr-thumb-ph{width:30px;height:30px;border-radius:4px;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px}
.bsel-row .bsr-info{flex:1;min-width:0}
.bsel-row .bsr-name{font-size:11px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bsel-row .bsr-sub{font-size:9px;color:var(--tx3);font-family:var(--mono);margin-top:1px}
.bsel-row .bsr-cost{font-size:10px;font-weight:700;color:var(--am);font-family:var(--mono);flex-shrink:0}
/* Link existing picker */
.link-item{padding:8px 10px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.1s;border:1px solid transparent}
.link-item:hover{background:var(--bg3);border-color:var(--br)}
.link-item.sel{background:var(--acg);border-color:var(--acb)}
/* Layer 2 manual link button */
.link-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:var(--r);font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--acb);background:var(--acg);color:var(--ac);font-family:var(--mono);transition:all 0.12s}
.link-btn:hover{background:var(--ac);color:#fff}
/* Edit building inline */
.bov-edit-row{display:flex;gap:6px;align-items:center;margin-top:8px}
.client-tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;border:1px solid}
.ct-hospital{background:rgba(232,69,69,.1);color:#E84545;border-color:rgba(232,69,69,.25)}
.ct-university,.ct-school{background:rgba(43,127,255,.1);color:#2B7FFF;border-color:rgba(43,127,255,.25)}
.ct-government{background:rgba(245,166,35,.1);color:#F5A623;border-color:rgba(245,166,35,.25)}
.ct-corporate{background:rgba(155,109,255,.1);color:#9B6DFF;border-color:rgba(155,109,255,.25)}
.ct-research{background:rgba(0,212,255,.1);color:#00D4FF;border-color:rgba(0,212,255,.2)}
.ct-other{background:var(--bg4);color:var(--tx3);border-color:var(--br)}
.pf-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--br);color:var(--tx3);font-family:var(--mono);transition:all .12s}
.pf-chip:hover{border-color:var(--br2);color:var(--tx2)}
.pf-chip.on{border-color:var(--ac);background:var(--acg);color:var(--ac)}
.cmap-grid{display:grid;grid-template-columns:160px 1fr;gap:0;border:1px solid var(--br);border-radius:var(--r2);overflow:hidden}
.cmap-lbl{padding:9px 12px;font-size:11px;font-weight:600;color:var(--tx2);background:var(--bg3);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:6px}
.cmap-lbl:last-of-type{border-bottom:none}
.cmap-cell{padding:7px 10px;background:var(--bg2);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:6px}
.cmap-cell:last-of-type{border-bottom:none}
.cmap-seg{height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.9);min-width:20px;cursor:default;transition:opacity .15s;flex-shrink:0}
.cmap-seg:hover{opacity:.75}
@media print{
  .no-print{display:none!important}
  .sidebar,.topbar,.tb-btn,.btn,.dp,.ov,.toasts,.pp-toolbar{display:none!important}
  .content{padding:0!important;overflow:visible!important}
  .body,.shell{display:block!important}
  body,html{background:#fff!important;color:#000!important;overflow:auto!important}
  .pp-page{box-shadow:none!important;margin:0!important;border-radius:0!important;page-break-after:always}
  .pp-page:last-child{page-break-after:auto}
}
.print-preview{position:fixed;inset:0;background:#111827;z-index:2000;overflow-y:auto}
.pp-toolbar{position:sticky;top:0;background:#0f1720;border-bottom:1px solid #253040;padding:12px 20px;display:flex;align-items:center;gap:10px;z-index:10}
.pp-page{background:#fff;color:#111;max-width:860px;margin:20px auto;border-radius:10px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.rp-cover{padding:48px;background:#163a5f}
.rp-cover-eyebrow{font-size:10px;color:rgba(255,255,255,.5);font-family:monospace;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.rp-cover-title{font-family:"Segoe UI",system-ui,sans-serif;font-size:34px;font-weight:900;color:#fff;line-height:1.15;margin-bottom:4px}
.rp-cover-sub{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:28px}
.rp-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rp-meta{background:rgba(255,255,255,.08);border-radius:6px;padding:10px 14px}
.rp-meta-l{font-size:9px;color:rgba(255,255,255,.45);font-family:monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.rp-meta-v{font-size:13px;font-weight:600;color:#fff}
.rp-section{padding:32px 40px}
.rp-section+.rp-section{border-top:1px solid #e9ecef}
.rp-sh{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1A5276;font-family:monospace;margin-bottom:16px;padding-bottom:9px;border-bottom:2px solid #1A5276;display:flex;align-items:center;justify-content:space-between}
.rp-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.rp-kpi{background:#f8f9fa;border-radius:8px;padding:14px;border-left:3px solid}
.rp-kpi-v{font-family:"Segoe UI",system-ui,sans-serif;font-size:24px;font-weight:900;line-height:1;margin-bottom:3px}
.rp-kpi-l{font-size:9px;color:#888;font-family:monospace;text-transform:uppercase;letter-spacing:.06em}
.rp-table{width:100%;border-collapse:collapse;font-size:11px}
.rp-table th{background:#0D2B4E;color:#fff;padding:7px 10px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.06em;font-family:monospace}
.rp-table td{padding:7px 10px;border-bottom:1px solid #e9ecef;vertical-align:middle}
.rp-table tr:nth-child(even) td{background:#f8f9fa}
.rp-table tr:last-child td{border-bottom:none}
.rp-cbar{display:flex;height:18px;border-radius:5px;overflow:hidden;gap:1px;margin-bottom:8px}
.rp-cbar-seg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.9);transition:flex .4s}
.rp-proj{background:#f8f9fa;border-radius:8px;padding:14px 16px;margin-bottom:10px;border-left:4px solid}
.rp-disclaimer{background:#f0f4f8;border-radius:6px;padding:14px 18px;border-left:3px solid #1A5276;font-size:10px;color:#555;line-height:1.6;margin-top:20px}
/* Sortable table headers */
th.sort{cursor:pointer;-webkit-user-select:none;-moz-user-select:none;user-select:none;white-space:nowrap}
th.sort:hover{color:var(--tx2);background:var(--bg4)}
th.sort.asc::after{content:' ↑';color:var(--ac)}
th.sort.desc::after{content:' ↓';color:var(--ac)}
th.sort.active{color:var(--ac)}
/* Copy row button */
.copy-btn{opacity:0;padding:3px 7px;border-radius:var(--r);font-size:9px;font-weight:700;border:1px solid var(--br2);background:var(--bg4);color:var(--tx3);cursor:pointer;transition:all 0.12s;font-family:var(--mono)}
tr:hover .copy-btn{opacity:1}
.copy-btn:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
/* Flat / grouped view toggle */
.view-toggle{display:flex;gap:2px;padding:3px;background:var(--bg3);border-radius:var(--r);flex-shrink:0}
.vt-btn{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;color:var(--tx3);transition:all 0.12s;font-family:var(--mono);border:none;background:transparent}
.vt-btn.on{background:var(--bg2);color:var(--tx);border:1px solid var(--br)}
/* Sort/filter bar */
.sort-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;align-items:center}
.sort-chip{padding:3px 11px;border-radius:var(--r4);font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--br);color:var(--tx3);font-family:var(--mono);transition:all 0.12s;background:transparent;display:inline-flex;align-items:center;justify-content:center}
.sort-chip:hover{border-color:var(--br2);color:var(--tx2)}
.sort-chip.on{background:var(--acg);color:var(--ac);border-color:var(--acb)}
/* Row selected */
tr.row-sel td{background:var(--acg)!important}
/* Bulk actions bar */
.bulk-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--acg);border:1px solid var(--acb);border-radius:var(--r);margin-bottom:8px;font-size:12px}
/* Content */
.content{flex:1;overflow-y:auto;padding:20px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;border:none;font-family:var(--font);white-space:nowrap}
.btn-p{background:var(--ac);color:#fff}
.btn-p:hover{background:var(--ac2);box-shadow:none;transform:translateY(-1px)}
.btn-g{background:transparent;color:var(--tx2);border:1px solid var(--br)}
.btn-g:hover{background:var(--bg3);color:var(--tx);border-color:var(--br2)}
.btn-d{background:var(--rdg);color:var(--rd);border:1px solid var(--rdb)}
.btn-d:hover{background:var(--rd);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn-ic{padding:5px;background:transparent;color:var(--tx3);border:1px solid var(--br);border-radius:var(--r);cursor:pointer;transition:all 0.12s;font-size:12px}
.btn-ic:hover{background:var(--bg3);color:var(--tx)}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2)}
.card-p{padding:18px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-t{font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--tx3);text-transform:uppercase;font-family:var(--mono)}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono);white-space:nowrap}
.b-bc1,.b-bc2{background:rgba(15,186,122,0.12);color:#2EE69A;border:1px solid rgba(15,186,122,0.2)}
.b-bc3{background:var(--cyg);color:var(--cy);border:1px solid rgba(0,212,255,0.15)}
.b-bc4{background:var(--amg);color:var(--am);border:1px solid var(--amb)}
.b-bc5{background:var(--org);color:var(--or);border:1px solid var(--orb)}
.b-bc6{background:var(--rdg);color:var(--rd);border:1px solid var(--rdb)}
.b-cr{background:var(--rdg);color:var(--rd);border:1px solid var(--rdb)}
.b-y{background:var(--amg);color:var(--am);border:1px solid var(--amb)}
.b-dm{background:var(--pug);color:var(--pu);border:1px solid var(--pub)}
.b-n{background:var(--bg4);color:var(--tx3);border:1px solid var(--br)}
.b-pri1{background:var(--rdg);color:var(--rd);border:1px solid var(--rdb)}
.b-pri2{background:var(--org);color:var(--or);border:1px solid var(--orb)}
.b-pri3{background:var(--amg);color:var(--am);border:1px solid var(--amb)}
.b-pri4{background:var(--cyg);color:var(--cy);border:1px solid rgba(0,212,255,0.15)}
.b-pri5{background:var(--bg4);color:var(--tx3);border:1px solid var(--br)}
.uf{font-family:var(--mono);font-size:10px;padding:1px 6px;background:var(--pug);color:var(--pu);border:1px solid var(--pub);border-radius:4px}
/* Tables */
.tw{overflow-x:auto;border:1px solid var(--br);border-radius:var(--r2)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);color:var(--tx3);font-weight:500;text-align:left;padding:8px 11px;font-size:10px;letter-spacing:0.07em;text-transform:uppercase;font-family:var(--mono);border-bottom:1px solid var(--br);white-space:nowrap;position:sticky;top:0;z-index:5}
td{padding:8px 11px;border-bottom:1px solid var(--br);color:var(--tx);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
/* Forms */
.fg{display:flex;flex-direction:column;gap:4px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fg.full{grid-column:1/-1}
label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.08em;font-family:var(--mono)}
input,select,textarea{background:var(--bg3);border:1px solid var(--br);border-radius:var(--r);padding:7px 9px;color:var(--tx);font-size:12px;font-family:var(--font);width:100%;transition:border-color 0.12s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--acg)}
input::placeholder,textarea::placeholder{color:var(--tx4)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:56px;line-height:1.5}
input.mono{font-family:var(--mono)}
/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.sc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:14px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;inset:0 0 auto;height:2px}
.sc.bl::before{background:var(--ac)}
.sc.gr::before{background:var(--gr)}
.sc.am::before{background:var(--am)}
.sc.rd::before{background:var(--rd)}
.sc.pu::before{background:var(--pu)}
.sv{font-family:var(--display);font-size:26px;font-weight:900;line-height:1;margin-bottom:3px}
.sl{font-size:9px;color:var(--tx3);font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase}
.ss{font-size:11px;color:var(--tx2);margin-top:4px}
/* Section collapsible */
.sh{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:var(--r);margin-bottom:2px;cursor:pointer;-webkit-user-select:none;-moz-user-select:none;user-select:none;border:1px solid transparent;transition:all 0.12s}
.sh:hover{border-color:var(--br)}
.sh-t{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:0.08em;font-family:var(--mono);flex:1}
.sh-c{font-size:10px;color:var(--tx3);font-family:var(--mono)}
.arr{color:var(--tx3);font-size:10px;transition:transform 0.2s;flex-shrink:0}
.arr.op{transform:rotate(90deg)}
/* Sheet tabs */
.stabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.stab{padding:4px 11px;border-radius:var(--r4);font-size:11px;cursor:pointer;border:1px solid var(--br);color:var(--tx3);transition:all 0.12s;font-family:var(--mono)}
.stab:hover{border-color:var(--br2);color:var(--tx2)}
.stab.on{background:var(--ac);color:#fff;border-color:var(--ac)}
/* Search */
.srch{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--br);border-radius:var(--r);padding:0 9px;margin-bottom:10px}
.srch input{background:transparent;border:none;padding:7px 0;flex:1}
.si{color:var(--tx3);flex-shrink:0}
/* Rating pills */
.rg{display:flex;flex-wrap:wrap;gap:5px}
.rp{padding:4px 9px;border-radius:var(--r4);font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid var(--br);background:var(--bg3);color:var(--tx3);transition:all 0.12s;font-family:var(--mono)}
.rp:hover{border-color:var(--br2);color:var(--tx2)}
.rp.on-bc1,.rp.on-bc2{background:var(--grg);color:#2EE69A;border-color:var(--gr)}
.rp.on-bc3{background:var(--cyg);color:var(--cy);border-color:var(--cy)}
.rp.on-bc4{background:var(--amg);color:var(--am);border-color:var(--am)}
.rp.on-bc5{background:var(--org);color:var(--or);border-color:var(--or)}
.rp.on-bc6{background:var(--rdg);color:var(--rd);border-color:var(--rd)}
.rp.on-mi1,.rp.on-mi2{background:var(--acg);color:var(--ac);border-color:var(--ac)}
.rp.on-mi3{background:var(--amg);color:var(--am);border-color:var(--am)}
.rp.on-mi4,.rp.on-mi5{background:var(--rdg);color:var(--rd);border-color:var(--rd)}
.rp.on-mr{background:var(--pug);color:var(--pu);border-color:var(--pu)}
.rp.on-mrn{background:var(--bg4);color:var(--tx3);border-color:var(--br2)}
.rp.on-r{background:var(--grg);color:var(--gr);border-color:var(--gr)}
.rp.on-rl1{background:var(--bg4);color:var(--tx3);border-color:var(--br2)}
.rp.on-rl2,.rp.on-rl3{background:var(--amg);color:var(--am);border-color:var(--am)}
.rp.on-rl4{background:var(--rdg);color:var(--rd);border-color:var(--rd)}
.rp.on-replace{background:var(--rdg);color:var(--rd);border-color:var(--rd)}
.rp.on-repair{background:var(--amg);color:var(--am);border-color:var(--am)}
.rp.on-repair-in-place{background:var(--cyg);color:var(--cy);border-color:var(--cy)}
.rp.on-deferred{background:var(--pug);color:var(--pu);border-color:var(--pu)}
.rp.on-monitor{background:var(--acg);color:var(--ac);border-color:var(--ac)}
.rp.on-no-action{background:var(--bg4);color:var(--tx3);border-color:var(--br2)}
.rp.on-y{background:var(--amg);color:var(--am);border-color:var(--am)}
.rp.on-cr{background:var(--rdg);color:var(--rd);border-color:var(--rd)}
.rp.on-dm{background:var(--pug);color:var(--pu);border-color:var(--pu)}
.rp.on-n{background:var(--bg4);color:var(--tx3);border-color:var(--br2)}
.rp.on-1-critical{background:var(--rdg);color:var(--rd);border-color:var(--rd)}
.rp.on-2-high{background:var(--org);color:var(--or);border-color:var(--or)}
.rp.on-3-medium{background:var(--amg);color:var(--am);border-color:var(--am)}
.rp.on-4-low{background:var(--cyg);color:var(--cy);border-color:var(--cy)}
.rp.on-5-monitor{background:var(--bg4);color:var(--tx3);border-color:var(--br2)}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.mo{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--r3);width:100%;max-width:700px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.mo-h{padding:14px 18px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mo-t{font-size:14px;font-weight:600}
.mo-b{padding:18px;overflow-y:auto;flex:1}
.mo-f{padding:12px 18px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
/* Detail slide panel */
.dp{position:fixed;right:0;top:50px;bottom:0;width:460px;background:var(--bg2);border-left:1px solid var(--br);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.22s cubic-bezier(0.4,0,0.2,1);box-shadow:-12px 0 40px rgba(0,0,0,0.5)}
.dp.op{transform:translateX(0)}
.dp-h{padding:14px 16px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px;flex-shrink:0}
.dp-b{padding:16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px}
.dp-f{padding:12px 16px;border-top:1px solid var(--br);display:flex;gap:7px;flex-shrink:0}
.dp-st{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.08em;font-family:var(--mono);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--br)}
/* Project card */
.pc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:14px;margin-bottom:7px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;padding-left:18px}
.pc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.pc.p1::before{background:var(--rd)}
.pc.p2::before{background:var(--or)}
.pc.p3::before{background:var(--am)}
.pc.p4::before{background:var(--cy)}
.pc.p5::before{background:var(--tx3)}
.pc:hover{border-color:var(--br2);background:var(--bg3)}
.pc.sel{border-color:var(--ac);background:var(--acg)}
.pc-id{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--ac);background:var(--acg);padding:2px 7px;border-radius:4px;border:1px solid var(--acb);display:inline-block;margin-bottom:5px}
.pc-name{font-size:13px;font-weight:600;margin-bottom:6px}
.pc-cost{font-family:var(--display);font-size:22px;font-weight:900;line-height:1}
.pc-lbl{font-size:9px;color:var(--tx3);font-family:var(--mono);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em}
.plinks{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px}
.plt{font-size:9px;font-family:var(--mono);padding:2px 6px;background:var(--bg4);border:1px solid var(--br);border-radius:3px;color:var(--tx2)}
/* Cost callout */
.cc{background:var(--bg3);border:1px solid var(--br);border-radius:var(--r2);padding:16px 18px}
.cc-v{font-family:var(--display);font-size:34px;font-weight:900;line-height:1;color:var(--tx)}
.cc-l{font-size:10px;color:var(--tx3);font-family:var(--mono);margin-top:3px;text-transform:uppercase;letter-spacing:0.08em}
/* Alert/warn */
.warn{background:rgba(232,69,69,0.06);border:1px solid rgba(232,69,69,0.2);border-radius:var(--r);padding:9px 11px;font-size:11px;color:var(--rd);display:flex;gap:7px;align-items:flex-start;line-height:1.4}
.warn.am{background:rgba(255,122,43,0.06);border-color:rgba(255,122,43,0.2);color:var(--or)}
/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--tx3)}
.ei{font-size:36px;display:block;margin-bottom:10px}
.et{font-size:15px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.es{font-size:12px}
/* Cond bar */
.cbar{display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px;margin-top:5px}
.cseg{border-radius:2px;transition:flex 0.4s}
/* Divider */
.div{height:1px;background:var(--br);margin:10px 0}
/* Tabs */
.tabs{display:flex;gap:2px;padding:3px;background:var(--bg3);border-radius:var(--r);margin-bottom:14px}
.tab{flex:1;padding:6px 10px;border-radius:5px;text-align:center;font-size:11px;font-weight:500;cursor:pointer;color:var(--tx3);transition:all 0.12s;font-family:var(--mono)}
.tab.on{background:var(--bg2);color:var(--tx);border:1px solid var(--br)}
/* Toast */
.toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--r);padding:9px 14px;font-size:12px;color:var(--tx);box-shadow:var(--sh);display:flex;align-items:center;gap:7px;animation:tIn .25s ease}
.toast.ok{border-left:3px solid var(--gr)}
.toast.er{border-left:3px solid var(--rd)}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Spinner */
.spin{width:16px;height:16px;border:2px solid var(--br2);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* Catalog item */
.cat-item{padding:7px 10px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.1s}
.cat-item:hover{background:var(--bg3)}
/* Life bar */
.lb-wrap{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:4px}
.lb-fill{height:100%;border-radius:2px;transition:width 0.4s}
/* iPad media */
#mNavToggle{display:none}
#mNavScrim{display:none}
@media(max-width:768px){
  .content{padding:14px}
  .sidebar{position:fixed;top:50px;left:0;bottom:0;width:248px;max-width:82vw;transform:translateX(-104%);transition:transform .25s ease;z-index:200;box-shadow:2px 0 18px rgba(0,0,0,.45)}
  html.nav-open .sidebar{transform:none}
  html.nav-open #mNavScrim{display:block;position:fixed;top:50px;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:150}
  #mNavToggle{display:flex;align-items:center;justify-content:center;position:fixed;top:7px;left:8px;width:38px;height:36px;border-radius:8px;background:var(--bg3);color:var(--tx);border:1px solid var(--br);font-size:18px;z-index:300;cursor:pointer}
  .topbar{padding-left:54px;gap:8px;overflow-x:auto}
  .tb-btn-ghost{display:none}
  .dp{width:100%}
  .fg2,.fg3{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
}
/* Light theme */
html.theme-light{
  --bg:#F5F7FA;--bg2:#FFFFFF;--bg3:#EEF1F6;--bg4:#E4E8EF;--bg5:#D8DDE8;
  --br:#D0D6E2;--br2:#B8C0CF;--br3:#9AA5B8;
  --tx:#1A2233;--tx2:#3D4F68;--tx3:#6B7FA0;--tx4:#9AABCA;
  --ac:#1A6EF5;--ac2:#0F5ED8;--acg:rgba(26,110,245,.1);--acb:rgba(26,110,245,.22);
  --gr:#0A9E65;--grg:rgba(10,158,101,.1);--grb:rgba(10,158,101,.2);
  --am:#C87F00;--amg:rgba(200,127,0,.1);--amb:rgba(200,127,0,.22);
  --rd:#C9302C;--rdg:rgba(201,48,44,.08);--rdb:rgba(201,48,44,.2);
  --or:#C45A00;--org:rgba(196,90,0,.1);--orb:rgba(196,90,0,.2);
  --pu:#6A3FD4;--pug:rgba(106,63,212,.1);--pub:rgba(106,63,212,.2);
  --cy:#0090B0;--cyg:rgba(0,144,176,.08);
}
html.theme-light .topbar{background:#FFFFFF;border-color:#D0D6E2}
html.theme-light .sidebar{background:#FFFFFF;border-color:#D0D6E2}
html.theme-light .logo{color:#1A2233}
html.theme-light th{background:#EEF1F6}
html.theme-light .sh{background:#EEF1F6}
html.theme-light input,html.theme-light select,html.theme-light textarea{background:#F5F7FA;border-color:#D0D6E2;color:#1A2233}
html.theme-light .card,.theme-light .card-p{background:#FFFFFF}
/* Black-white (high contrast) theme */
html.theme-bw{
  --bg:#000000;--bg2:#0A0A0A;--bg3:#141414;--bg4:#1E1E1E;--bg5:#282828;
  --br:#333333;--br2:#444444;--br3:#555555;
  --tx:#FFFFFF;--tx2:#DDDDDD;--tx3:#999999;--tx4:#555555;
  --ac:#FFFFFF;--ac2:#DDDDDD;--acg:rgba(255,255,255,.08);--acb:rgba(255,255,255,.2);
  --gr:#FFFFFF;--grg:rgba(255,255,255,.06);--grb:rgba(255,255,255,.15);
  --am:#CCCCCC;--amg:rgba(200,200,200,.08);--amb:rgba(200,200,200,.15);
  --rd:#FFFFFF;--rdg:rgba(255,255,255,.06);--rdb:rgba(255,255,255,.15);
  --or:#BBBBBB;--org:rgba(187,187,187,.08);--orb:rgba(187,187,187,.15);
  --pu:#AAAAAA;--pug:rgba(170,170,170,.08);--pub:rgba(170,170,170,.15);
  --cy:#EEEEEE;--cyg:rgba(238,238,238,.06);
}
.theme-cbd{

  --pu:#C879A7;--pug:rgba(200,121,167,.12);--pub:rgba(200,121,167,.24);
  --cy:#56B4E9;--cyg:rgba(86,180,233,.12);
}
.theme-cbt{
  --ac:#1FA89C;--ac2:#138578;--acg:rgba(31,168,156,.14);--acb:rgba(31,168,156,.3);
  --gr:#2BB89E;--grg:rgba(43,184,158,.14);--grb:rgba(43,184,158,.26);
  --am:#E76FB0;--amg:rgba(231,111,176,.14);--amb:rgba(231,111,176,.28);
  --rd:#E23B3B;--rdg:rgba(226,59,59,.14);--rdb:rgba(226,59,59,.3);
  --or:#E7298A;--org:rgba(231,41,138,.12);--orb:rgba(231,41,138,.24);
  --pu:#B47CD0;--pug:rgba(180,124,208,.12);--pub:rgba(180,124,208,.24);
  --cy:#5AB4AC;--cyg:rgba(90,180,172,.12);
}
.theme-hc{
  --bg:#000000;--bg2:#000000;--bg3:#0D0D0D;--bg4:#1A1A1A;--bg5:#262626;
  --br:#5A5A5A;--br2:#7A7A7A;--br3:#9A9A9A;
  --tx:#FFFFFF;--tx2:#EAEAEA;--tx3:#C0C0C0;--tx4:#9A9A9A;
  --ac:#40C4FF;--ac2:#00B0FF;--acg:rgba(64,196,255,.18);--acb:rgba(64,196,255,.5);
  --gr:#00E676;--grg:rgba(0,230,118,.16);--grb:rgba(0,230,118,.4);
  --am:#FFD600;--amg:rgba(255,214,0,.16);--amb:rgba(255,214,0,.4);
  --rd:#FF5252;--rdg:rgba(255,82,82,.16);--rdb:rgba(255,82,82,.4);
  --or:#FF9100;--org:rgba(255,145,0,.14);--orb:rgba(255,145,0,.32);
  --pu:#E040FB;--pug:rgba(224,64,251,.14);--pub:rgba(224,64,251,.32);
  --cy:#18FFFF;--cyg:rgba(24,255,255,.12);
}
.theme-cbdl{
  --bg:#F5F7FA;--bg2:#FFFFFF;--bg3:#EEF1F6;--bg4:#E4E8EF;--bg5:#D8DDE8;
  --br:#D0D6E2;--br2:#B8C0CF;--br3:#9AA5B8;
  --tx:#1A2233;--tx2:#3D4F68;--tx3:#6B7FA0;--tx4:#9AABCA;
  --ac:#005B96;--ac2:#00496E;--acg:rgba(0,91,150,.1);--acb:rgba(0,91,150,.28);
  --gr:#00796B;--grg:rgba(0,121,107,.1);--grb:rgba(0,121,107,.24);
  --am:#B8860B;--amg:rgba(184,134,11,.1);--amb:rgba(184,134,11,.26);
  --rd:#A83400;--rdg:rgba(168,52,0,.1);--rdb:rgba(168,52,0,.26);
  --or:#C8650A;--org:rgba(200,101,10,.1);--orb:rgba(200,101,10,.22);
  --pu:#8E44AD;--pug:rgba(142,68,173,.1);--pub:rgba(142,68,173,.22);
  --cy:#2E86C1;--cyg:rgba(46,134,193,.1);
}
.theme-cbtl{
  --bg:#F5F7FA;--bg2:#FFFFFF;--bg3:#EEF1F6;--bg4:#E4E8EF;--bg5:#D8DDE8;
  --br:#D0D6E2;--br2:#B8C0CF;--br3:#9AA5B8;
  --tx:#1A2233;--tx2:#3D4F68;--tx3:#6B7FA0;--tx4:#9AABCA;
  --ac:#00695C;--ac2:#004D40;--acg:rgba(0,105,92,.1);--acb:rgba(0,105,92,.28);
  --gr:#2E9E8F;--grg:rgba(46,158,143,.1);--grb:rgba(46,158,143,.24);
  --am:#C2548E;--amg:rgba(194,84,142,.1);--amb:rgba(194,84,142,.26);
  --rd:#B0150F;--rdg:rgba(176,21,15,.1);--rdb:rgba(176,21,15,.26);
  --or:#B0136E;--org:rgba(176,19,110,.1);--orb:rgba(176,19,110,.22);
  --pu:#7E57C2;--pug:rgba(126,87,194,.1);--pub:rgba(126,87,194,.22);
  --cy:#00838F;--cyg:rgba(0,131,143,.1);
}
html.theme-bw .btn-p{background:#FFFFFF;color:#000000}
html.theme-bw .btn-p:hover{background:#DDDDDD;box-shadow:none}
html.theme-bw .sb-item.on{background:rgba(255,255,255,.12);color:#FFFFFF;border-color:rgba(255,255,255,.3)}
html.theme-bw .stab.on{background:#FFFFFF;color:#000}
html.theme-bw .bldg-card-sb{background:#0A0A0A!important;border-color:#444!important}
html.theme-bw .bldg-card-sb .bc-name{color:#FFFFFF!important}
html.theme-bw .bldg-card-sb .bc-sub,.bldg-card-sb .bc-cost{color:#BBBBBB!important}
html.theme-bw .bov-cost-item{background:#1A1A1A!important}
html.theme-bw .bov-cost-item .val{color:#FFFFFF!important}
html.theme-bw .bov-cost-item .lbl{color:#AAAAAA!important}
html.theme-bw input,html.theme-bw select,html.theme-bw textarea{background:#0A0A0A!important;color:#FFFFFF!important;border-color:#444!important}
html.theme-bw .sh{background:#111!important}
html.theme-bw th{background:#111!important;color:#CCCCCC!important}
html.theme-bw td{color:#DDDDDD!important}
html.theme-bw .pp-page{background:#0A0A0A!important;color:#FFFFFF!important}
html.theme-bw .rp-table th{background:#111!important;color:#FFF!important}
html.theme-bw .rp-table td{border-color:#333!important;color:#DDD!important}
html.theme-bw .rp-kpi{background:#111!important}
/* Theme toggle button */
.theme-btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:0 12px;height:34px;box-sizing:border-box;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--br);color:var(--tx3);background:transparent;font-family:var(--mono);transition:all .12s;line-height:1;white-space:nowrap;margin:0}
.theme-btn:hover{background:var(--bg3);color:var(--tx2);border-color:var(--br2)}
.theme-btn.active{background:var(--acg);color:var(--ac);border-color:var(--acb)}
.theme-picker{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);border:1px solid var(--br2);border-radius:var(--r2);padding:8px;display:flex;flex-direction:column;gap:4px;z-index:200;min-width:180px;box-shadow:var(--sh)}
.tp-opt{padding:7px 12px;border-radius:var(--r);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;color:var(--tx2);transition:background .1s}
.tp-opt:hover{background:var(--bg3)}
.tp-opt.active{background:var(--acg);color:var(--ac)}
.tp-swatch{width:14px;height:14px;border-radius:3px;border:1px solid var(--br2);flex-shrink:0}
.ta-item{padding:9px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--br)}.ta-item:last-child{border-bottom:none}.ta-item:hover{background:var(--bg3)}.ta-item-desc{font-size:12px;font-weight:500;color:var(--tx)}.ta-item-meta{display:flex;gap:8px;margin-top:3px;align-items:center;flex-wrap:wrap}.ta-empty{padding:20px;font-size:12px;color:var(--tx3);text-align:center}.ce-notice{background:var(--amg);border:1px solid var(--amb);border-radius:var(--r);padding:10px 12px;font-size:11px;color:var(--am);margin-bottom:12px;line-height:1.5}.disc-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--mono);transition:all .12s;border:1px solid var(--br);color:var(--tx3);white-space:nowrap}.disc-chip:hover{border-color:var(--br2);color:var(--tx2)}.disc-chip.on{color:#fff;border-color:transparent}.disc-chip.arch.on{background:var(--ac)}.disc-chip.mech.on{background:var(--gr)}.disc-chip.elec.on{background:var(--pu)}.disc-chip.spec.on{background:var(--am)}.disc-chip.all.on{background:var(--bg4);color:var(--tx);border-color:var(--br2)}.sheet-pill{display:inline-flex;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;font-family:var(--mono);border:1px solid}.sp-arch{background:rgba(43,127,255,.1);color:var(--ac);border-color:rgba(43,127,255,.2)}.sp-mech{background:rgba(15,186,122,.1);color:var(--gr);border-color:rgba(15,186,122,.2)}.sp-elec{background:rgba(155,109,255,.1);color:var(--pu);border-color:rgba(155,109,255,.2)}.sp-spec{background:rgba(245,166,35,.1);color:var(--am);border-color:rgba(245,166,35,.2)}
.bldg-context-bar{display:flex;align-items:center;gap:12px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;min-height:42px}
.bldg-ctx-name{font-family:var(--display);font-size:15px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px}
.bldg-ctx-meta{font-size:10px;color:var(--tx3);font-family:var(--mono);display:flex;gap:8px;flex-wrap:wrap}
.bldg-ctx-dot{width:7px;height:7px;border-radius:50%;background:var(--gr);flex-shrink:0;animation:pulse 2s ease infinite}
.row-actions{display:flex;gap:3px;align-items:center;justify-content:flex-end;opacity:0;transition:opacity .15s}
tr:hover .row-actions{opacity:1}
/* Two-tier assessment tab bar */
.tier-tabs{display:flex;gap:0;background:var(--bg3);border-bottom:2px solid var(--br);flex-shrink:0;overflow-x:auto}
.tier-tab{padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx3);border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:var(--mono);transition:all .12s;display:flex;align-items:center;gap:6px}
.tier-tab:hover{color:var(--tx2);background:var(--bg4)}
.tier-tab.active{color:var(--tx);border-bottom-color:var(--ac)}
.tier-tab.arch.active{border-bottom-color:var(--ac)}
.tier-tab.mech.active{border-bottom-color:var(--gr)}
.tier-tab.elec.active{border-bottom-color:var(--pu)}
.tier-tab.spec.active{border-bottom-color:var(--am)}
.tier-tab .tab-badge{font-size:9px;padding:1px 5px;border-radius:10px;font-weight:700;font-family:var(--mono)}
.tier-tab.arch .tab-badge{background:rgba(43,127,255,.15);color:var(--ac)}
.tier-tab.mech .tab-badge{background:rgba(15,186,122,.15);color:var(--gr)}
.tier-tab.elec .tab-badge{background:rgba(155,109,255,.15);color:var(--pu)}
.tier-tab.spec .tab-badge{background:rgba(245,166,35,.15);color:var(--am)}
.tier-tab .warn-dot{width:6px;height:6px;border-radius:50%;background:var(--rd);flex-shrink:0}
.sub-tabs{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;overflow-x:auto;padding:0 8px}
.sub-tab{padding:6px 12px;font-size:11px;font-weight:500;cursor:pointer;color:var(--tx3);background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:var(--mono);transition:all .12s}
.sub-tab:hover{color:var(--tx2)}
.sub-tab.active{color:var(--tx);border-bottom-color:var(--br2)}
.sub-tab.arch.active{color:var(--ac);border-bottom-color:var(--ac)}
.sub-tab.mech.active{color:var(--gr);border-bottom-color:var(--gr)}
.sub-tab.elec.active{color:var(--pu);border-bottom-color:var(--pu)}
.sub-tab.spec.active{color:var(--am);border-bottom-color:var(--am)}
</style>
